<style>

            background: #FFFFFF;

        }

        .input-focus-ring:focus-within {
            border-color: #006096;
            box-shadow: 0 0 0 2px rgba(0, 96, 150, 0.1);
        }

        .btn-ripple {
            position: relative;
            overflow: hidden;
        }

        .btn-ripple:after {
            content: "";
            background: rgba(255, 255, 255, 0.3);
            display: block;
            position: absolute;
            border-radius: 50%;
            padding-top: 240%;
            padding-left: 240%;
            margin-top: -120%;
            margin-left: -120%;
            opacity: 0;
            transition: all 0.8s;
        }

        .btn-ripple:active:after {
            padding-top: 0;
            padding-left: 0;
            margin-top: 0;
            margin-left: 0;
            opacity: 1;
            transition: 0s;

<body class="min-h-screen flex items-center justify-center p-md">
<!-- Atmospheric WebGL-like Background -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-fixed opacity-20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[35%] h-[35%] bg-secondary-fixed opacity-25 blur-[100px] rounded-full"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-[420px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Header Branding -->
<header class="flex flex-col items-center mb-xl">
<div class="mb-md p-sm bg-primary-container rounded-xl shadow-lg">
<span class="material-symbols-outlined text-[40px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">
                FitLife AI
            </h1>
</header>
<!-- Reset Password Card -->
<section class="arctic-card p-lg rounded-xl space-y-lg">
<div class="space-y-xs">
<h2 class="font-title-md text-title-md text-on-background">
                    Reset Password
                </h2>
<p class="font-body-md text-body-md text-text-secondary leading-relaxed">
                    Enter your registered email address and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form -->
<form action="#" class="space-y-lg" id="resetForm" method="POST">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant font-semibold" for="email">
                        Email Address
                    </label>
<div class="relative flex items-center input-focus-ring border border-outline-variant rounded-lg transition-all duration-200">
<span class="material-symbols-outlined absolute left-md text-outline">
                            mail
                        </span>
<input class="w-full bg-transparent border-none focus:ring-0 py-[14px] pl-[48px] pr-md font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="btn-ripple w-full h-touch-target bg-primary text-on-primary font-title-md text-[16px] rounded-lg shadow-md hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
</button>
</form>
</section>
<!-- Footer -->
<footer class="mt-xl text-center">
<a class="inline-flex items-center gap-xs font-body-md text-body-md text-primary font-semibold hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px]">
                    arrow_back
                </span>
<span class="border-b-2 border-transparent group-hover:border-primary-container transition-all">Back to Login</span>
</a>
</footer>
<!-- Image Decoration / Aesthetic Illustration -->
<div class="mt-xl opacity-40 grayscale hover:grayscale-0 transition-all duration-500 cursor-default hidden sm:block">
<div class="h-[1px] w-full bg-gradient-to-r from-transparent via-divider to-transparent mb-xl"></div>
<div class="flex justify-center gap-lg">
<div class="flex flex-col items-center gap-xs">
<span class="material-symbols-outlined text-outline">shield_lock</span>
<span class="text-[10px] uppercase tracking-widest text-outline font-bold">Secure AI</span>
</div>
<div class="flex flex-col items-center gap-xs">
<span class="material-symbols-outlined text-outline">encrypted</span>
<span class="text-[10px] uppercase tracking-widest text-outline font-bold">Privacy First</span>
</div>
</div>
</div>
</main>
<script>
        // Micro-interaction for form submission
        const resetForm = document.getElementById('resetForm');
        resetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Sending...</span>
            `;

            // Simulate API call
            setTimeout(() => {
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Link Sent!</span>
                `;
                btn.classList.replace('bg-primary', 'bg-success');
                
                // Show a success message or redirect after a moment
                setTimeout(() => {
                    alert('If an account exists for that email, you will receive reset instructions shortly.');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-success', 'bg-primary');
                }, 2000);
            }, 1500);
        });
    </script>
