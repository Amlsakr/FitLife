<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .selection-card {
            transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .selection-card.selected {
            border-color: #006096; /* primary */
            background-color: #f0f7ff;
            box-shadow: 0 4px 12px rgba(0, 96, 150, 0.1);
        }
        .selection-card.selected .check-badge {
            opacity: 1;
            transform: scale(1);
        }
        .arctic-blur {
            backdrop-filter: blur(8px);
            background: rgba(252, 248, 255, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-arctic font-body-md text-on-background min-h-screen flex flex-col">
<!-- Top AppBar (from Shared Components) -->
<header class="bg-surface docked full-width top-0 sticky z-50 flex items-center justify-between px-md w-full h-touch-target-large">
<div class="flex items-center gap-sm">
<button class="hover:bg-surface-elevated rounded-full transition-colors p-2 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary">FitLife AI</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-xl max-w-4xl mx-auto w-full">
<!-- Header Section -->
<div class="text-center mb-xl animate-fade-in-up">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-xs">
                Welcome to FitLife
            </h1>
<p class="text-text-secondary font-body-md max-w-md mx-auto">
                Select your fitness level to personalize your journey.
            </p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg w-full mb-xl">
<!-- Beginner Card -->
<button class="selection-card relative flex flex-col items-start p-xl bg-surface-container-lowest border-2 border-divider rounded-xl text-left hover:border-outline-variant group active:scale-98" id="card-beginner" onclick="selectLevel('beginner')">
<div class="absolute top-4 right-4 check-badge opacity-0 scale-50 transition-all duration-300">
<div class="bg-primary text-on-primary rounded-full p-1">
<span class="material-symbols-outlined text-sm leading-none" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</div>
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center mb-lg group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-on-secondary-container text-4xl">eco</span>
</div>
<h3 class="font-title-md text-title-md text-on-surface mb-sm">Beginner</h3>
<p class="text-on-surface-variant font-body-md">
                    New to fitness or returning after a long break. We'll start with the basics.
                </p>
<!-- Decor Image Placeholder -->
<div class="mt-xl w-full h-32 rounded-lg overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="A serene, minimalist digital illustration of a green sprout growing from clean, arctic white soil. The background is a soft gradient of light blue and white, conveying a sense of fresh beginnings and calm energy. The style is clean and professional, matching a high-end health tech aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgXzy7VHkhEFlPODI3wB3pHudUa_C4UnTptYq9b_KMalqFRD1k3-5XLRxmWt8ESgz3NqIll25e2JYa_690dQAPlKv91nbt_JQFsKfs5yR3zY1enZzthntyvh1yokmB6KBhp8_kYsGIh6rUKfLzIA8TJF70nVB2r6o7A6usSpb_7gZyGKjWWwQKriusbAFWAXapJVJ7EYhJkwpbgw8lGr8t9mXSfAk5E8k3psp5YRRexEkUcNrUD65QVLEZ0HUU-FUYRU5fXOhjIfaJ"/>
</div>
</button>
<!-- Intermediate Card -->
<button class="selection-card relative flex flex-col items-start p-xl bg-surface-container-lowest border-2 border-divider rounded-xl text-left hover:border-outline-variant group active:scale-98" id="card-intermediate" onclick="selectLevel('intermediate')">
<div class="absolute top-4 right-4 check-badge opacity-0 scale-50 transition-all duration-300">
<div class="bg-primary text-on-primary rounded-full p-1">
<span class="material-symbols-outlined text-sm leading-none" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</div>
<div class="w-16 h-16 rounded-full bg-tertiary-fixed flex items-center justify-center mb-lg group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant text-4xl">bolt</span>
</div>
<h3 class="font-title-md text-title-md text-on-surface mb-sm">Intermediate</h3>
<p class="text-on-surface-variant font-body-md">
                    Regularly active and looking to level up performance with AI guidance.
                </p>
<!-- Decor Image Placeholder -->
<div class="mt-xl w-full h-32 rounded-lg overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="A dynamic, minimalist digital art piece showing stylized, glowing energy waves in deep cyan and primary blue against a crisp white background. The lines are sharp and represent strength, growth, and forward momentum. The lighting is bright and modern, suggesting a professional and high-performance fitness environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHoG5O7t0bpe4JCunja5EBe9Uwz7Z8fCgOZJ4vF_wc37Z4Ac51oRw_b05oylviznM03rj5xv1S9onyr0GucZHp0RB6kGrM0XFodKpe7lu8Yc-IVeG-TVLNW2PQUuEidPMu7YUiaNVJR5ZKCZ2qxnf1O9_wzXl2dkeNIZvaJEbkZMpVz88XIpMaM3r_mubbnRuINowsDFj9M7ry1wM0k1VWojVDua_ucFSUp35AdPDiwckupVOpT4e1vkVEOY7-3uRMivJ8BHAip5rD"/>
</div>
</button>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full p-md arctic-blur border-t border-divider md:relative md:bg-transparent md:border-none md:p-xl md:flex md:justify-center">
<div class="max-w-4xl w-full">
<button class="w-full py-touch-target bg-outline text-on-primary font-bold text-title-md rounded-xl shadow-lg transition-all duration-300 opacity-50 cursor-not-allowed transform active:scale-95 disabled:hover:scale-100" disabled="" id="continue-btn">
                Continue
            </button>
</div>
</footer>
<script>
        let selectedLevel = null;

        function selectLevel(level) {
            selectedLevel = level;
            
            // UI Updates
            const cards = ['beginner', 'intermediate'];
            cards.forEach(id => {
                const card = document.getElementById(`card-${id}`);
                if (id === level) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });

            // Enable Button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;
            btn.classList.remove('bg-outline', 'opacity-50', 'cursor-not-allowed');
            btn.classList.add('bg-primary', 'hover:bg-primary-container', 'opacity-100', 'cursor-pointer');
            
            // Add Ripple-like effect or micro-interaction
            console.log(`Level selected: ${level}`);
        }

        // Optional: Simple entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.animate-fade-in-up');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    el.style.transition = 'all 0.6s ease-out';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });
    </script>
</body></html>
