<body class="bg-background-arctic min-h-screen flex flex-col font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Transactional Header - Navigation Shell Suppressed -->
<header class="flex items-center justify-between px-md h-touch-target-large w-full max-w-2xl mx-auto pt-sm sticky top-0 bg-background-arctic/90 backdrop-blur-sm z-40">
<button aria-label="Go back" class="w-touch-target h-touch-target flex items-center justify-center rounded-full hover:bg-surface-elevated transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-sm text-label-sm text-text-secondary uppercase tracking-widest">Step 1 of 3</span>
<div class="w-24 h-1 bg-surface-elevated rounded-full mt-xs overflow-hidden">
<div class="w-1/3 h-full bg-primary rounded-full"></div>
</div>
</div>
<div class="w-touch-target"></div> <!-- Spacer for perfect centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-md w-full max-w-2xl mx-auto pt-lg pb-32">
<!-- Headers -->
<div class="mb-xl animate-fade-in-up">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-xs tracking-tight">
                What are your goals?
            </h1>
<p class="font-body-md text-body-md text-text-secondary">
                Select at least one to help us personalize your plan.
            </p>
</div>
<!-- Chips Grid -->
<div class="flex flex-wrap gap-sm" id="goals-container">
<!-- Chip: Weight Loss -->
<button aria-pressed="false" class="chip group flex items-center px-lg py-sm rounded-full border transition-all duration-300 ease-out font-title-md text-title-md-mobile md:text-title-md data-[selected=false]:bg-surface-elevated data-[selected=false]:text-text-secondary data-[selected=false]:border-outline-variant hover:data-[selected=false]:bg-surface-variant data-[selected=true]:bg-joint-cyan data-[selected=true]:text-on-primary data-[selected=true]:border-transparent data-[selected=true]:shadow-md hover:data-[selected=true]:brightness-105 active:scale-95" data-selected="false">
<div class="chip-icon-container flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 600;">check</span>
</div>
                Weight Loss
            </button>
<!-- Chip: Build Muscle -->
<button aria-pressed="false" class="chip group flex items-center px-lg py-sm rounded-full border transition-all duration-300 ease-out font-title-md text-title-md-mobile md:text-title-md data-[selected=false]:bg-surface-elevated data-[selected=false]:text-text-secondary data-[selected=false]:border-outline-variant hover:data-[selected=false]:bg-surface-variant data-[selected=true]:bg-joint-cyan data-[selected=true]:text-on-primary data-[selected=true]:border-transparent data-[selected=true]:shadow-md hover:data-[selected=true]:brightness-105 active:scale-95" data-selected="false">
<div class="chip-icon-container flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 600;">check</span>
</div>
                Build Muscle
            </button>
<!-- Chip: Improve Endurance -->
<button aria-pressed="false" class="chip group flex items-center px-lg py-sm rounded-full border transition-all duration-300 ease-out font-title-md text-title-md-mobile md:text-title-md data-[selected=false]:bg-surface-elevated data-[selected=false]:text-text-secondary data-[selected=false]:border-outline-variant hover:data-[selected=false]:bg-surface-variant data-[selected=true]:bg-joint-cyan data-[selected=true]:text-on-primary data-[selected=true]:border-transparent data-[selected=true]:shadow-md hover:data-[selected=true]:brightness-105 active:scale-95" data-selected="false">
<div class="chip-icon-container flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 600;">check</span>
</div>
                Improve Endurance
            </button>
<!-- Chip: Flexibility -->
<button aria-pressed="false" class="chip group flex items-center px-lg py-sm rounded-full border transition-all duration-300 ease-out font-title-md text-title-md-mobile md:text-title-md data-[selected=false]:bg-surface-elevated data-[selected=false]:text-text-secondary data-[selected=false]:border-outline-variant hover:data-[selected=false]:bg-surface-variant data-[selected=true]:bg-joint-cyan data-[selected=true]:text-on-primary data-[selected=true]:border-transparent data-[selected=true]:shadow-md hover:data-[selected=true]:brightness-105 active:scale-95" data-selected="false">
<div class="chip-icon-container flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 600;">check</span>
</div>
                Flexibility
            </button>
<!-- Chip: General Fitness -->
<button aria-pressed="false" class="chip group flex items-center px-lg py-sm rounded-full border transition-all duration-300 ease-out font-title-md text-title-md-mobile md:text-title-md data-[selected=false]:bg-surface-elevated data-[selected=false]:text-text-secondary data-[selected=false]:border-outline-variant hover:data-[selected=false]:bg-surface-variant data-[selected=true]:bg-joint-cyan data-[selected=true]:text-on-primary data-[selected=true]:border-transparent data-[selected=true]:shadow-md hover:data-[selected=true]:brightness-105 active:scale-95" data-selected="false">
<div class="chip-icon-container flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 600;">check</span>
</div>
                General Fitness
            </button>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-background-arctic via-background-arctic to-transparent pt-xl pb-md px-md z-50 flex justify-center">
<div class="w-full max-w-2xl bg-surface p-md rounded-2xl shadow-[0_-4px_24px_rgba(0,96,150,0.05)] border border-surface-variant">
<button class="w-full h-touch-target-large rounded-lg font-title-md text-title-md flex items-center justify-center transition-all duration-300 relative overflow-hidden disabled:bg-surface-variant disabled:text-outline disabled:cursor-not-allowed disabled:shadow-none bg-primary text-on-primary hover:bg-surface-tint active:scale-[0.98] shadow-[0_4px_12px_rgba(0,96,150,0.2)]" disabled="" id="continue-btn">
<span class="relative z-10">Continue</span>
<!-- Ripple effect container -->
<span class="absolute inset-0 bg-white opacity-0 transition-opacity duration-300 group-active:opacity-20"></span>
</button>
</div>
</div>
<style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
    </style>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('.chip');
            const continueBtn = document.getElementById('continue-btn');
            
            function updateButtonState() {
                const selectedCount = document.querySelectorAll('.chip[data-selected="true"]').length;
                if (selectedCount > 0) {
                    continueBtn.removeAttribute('disabled');
                } else {
                    continueBtn.setAttribute('disabled', 'true');
                }
            }

            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const isSelected = chip.getAttribute('data-selected') === 'true';
                    chip.setAttribute('data-selected', !isSelected);
                    chip.setAttribute('aria-pressed', !isSelected);
                    
                    // Simple haptic feedback if supported
                    if (window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate(10);
                    }
                    
                    updateButtonState();
                });
            });
        });
    </script>
</body></html>
