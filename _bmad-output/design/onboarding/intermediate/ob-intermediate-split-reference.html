<body class="bg-background-arctic font-body-md text-on-background min-h-screen flex flex-col">
<!-- Top App Bar (Shared Component Logic) -->
<header class="w-full top-0 sticky z-50 bg-background dark:bg-session-dark-bg flex items-center justify-between px-md h-touch-target">
<div class="flex items-center gap-sm">
<button class="w-touch-target h-touch-target flex items-center justify-center text-primary hover:bg-surface-elevated transition-colors duration-200 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>

</div>
<div class="font-label-sm text-label-sm text-outline px-sm py-xs bg-surface-container-high rounded-lg">
            Step 1 of 3
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin-mobile pt-xl pb-xl max-w-lg mx-auto w-full">
<!-- Headline Section -->
<div class="mb-xl text-center md:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">
                What's your current split?
            </h1>
<p class="font-body-md text-body-md text-text-secondary leading-relaxed">
                Select your existing routine so we can optimize your progression.
            </p>
</div>
<!-- Selection Grid/List -->
<div class="space-y-md mb-xl" id="options-container">
<!-- Full Body -->
<label class="option-card relative flex items-center p-lg bg-surface border-2 border-divider rounded-xl cursor-pointer shadow-sm group">
<input class="hidden peer" name="split" type="radio" value="full-body"/>
<div class="flex-grow">
<h3 class="font-title-md text-on-surface group-hover:text-primary transition-colors">Full Body</h3>
<p class="text-sm text-text-secondary">Hit every muscle group in a single session.</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary transition-colors">
<div class="radio-inner w-3 h-3 rounded-full bg-primary scale-0 transition-transform"></div>
</div>
</label>
<!-- Upper/Lower -->
<label class="option-card relative flex items-center p-lg bg-surface border-2 border-divider rounded-xl cursor-pointer shadow-sm group">
<input class="hidden peer" name="split" type="radio" value="upper-lower"/>
<div class="flex-grow">
<h3 class="font-title-md text-on-surface group-hover:text-primary transition-colors">Upper/Lower</h3>
<p class="text-sm text-text-secondary">Split sessions between upper and lower body movements.</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary transition-colors">
<div class="radio-inner w-3 h-3 rounded-full bg-primary scale-0 transition-transform"></div>
</div>
</label>
<!-- Push/Pull/Legs -->
<label class="option-card relative flex items-center p-lg bg-surface border-2 border-divider rounded-xl cursor-pointer shadow-sm group">
<input class="hidden peer" name="split" type="radio" value="ppl"/>
<div class="flex-grow">
<h3 class="font-title-md text-on-surface group-hover:text-primary transition-colors">Push/Pull/Legs</h3>
<p class="text-sm text-text-secondary">A classic bodybuilding split for balanced muscle growth.</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary transition-colors">
<div class="radio-inner w-3 h-3 rounded-full bg-primary scale-0 transition-transform"></div>
</div>
</label>
<!-- Custom/Other -->
<label class="option-card relative flex items-center p-lg bg-surface border-2 border-divider rounded-xl cursor-pointer shadow-sm group">

</div>

<!-- Bottom Navigation / Action Shell -->
<div class="sticky bottom-0 w-full bg-surface border-t border-divider p-md flex items-center justify-center">
<button class="w-full max-w-lg h-touch-target-large bg-outline-variant text-on-primary rounded-xl font-title-md shadow-md transition-all duration-300 opacity-50 cursor-not-allowed" disabled="" id="continue-btn">
            Continue
        </button>
</div>
<!-- Scripts for Micro-interactions -->
<script>
        const radioButtons = document.querySelectorAll('input[name="split"]');
        const cards = document.querySelectorAll('.option-card');
        const continueBtn = document.getElementById('continue-btn');

        radioButtons.forEach((radio, index) => {
            radio.addEventListener('change', () => {
                // Clear previous active states
                cards.forEach(card => {
                    card.classList.remove('active', 'border-primary', 'bg-surface-container-high');
                    card.classList.add('border-divider', 'bg-surface');
                });

                // Apply active state to parent card
                const card = radio.closest('.option-card');
                card.classList.add('active', 'border-primary', 'bg-surface-container-high');
                card.classList.remove('border-divider', 'bg-surface');

                // Enable primary button
                continueBtn.disabled = false;
                continueBtn.classList.remove('bg-outline-variant', 'opacity-50', 'cursor-not-allowed');
                continueBtn.classList.add('bg-primary', 'hover:bg-primary-container', 'active:scale-95');
                
                // Visual ripple/feedback
                console.log(`Selected split: ${radio.value}`);
            });
        });

        // Continue button interaction
        continueBtn.addEventListener('click', () => {
            if(!continueBtn.disabled) {
                continueBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
                setTimeout(() => {
                    alert('Progressing to Step 2...');
                    continueBtn.innerText = 'Continue';
                }, 800);
            }
        });
    </script>
