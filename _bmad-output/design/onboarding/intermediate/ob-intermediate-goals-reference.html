                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "400" }]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chip-active {
            background-color: #00BCD4 !important;
            color: #ffffff !important;
            border-color: #00BCD4 !important;
        }
        .arctic-gradient {
            background: linear-gradient(135deg, #F0F4F8 0%, #ffffff 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-arctic min-h-screen flex flex-col font-body-md text-on-background antialiased">
<!-- Header Navigation (Simplified for Onboarding) -->
<header class="w-full top-0 sticky bg-background/80 backdrop-blur-md z-40 px-md h-touch-target flex items-center justify-between">
<button aria-label="Go back" class="flex items-center justify-center w-touch-target h-touch-target text-primary hover:bg-surface-elevated transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-title-md text-primary opacity-60">Step 2 of 3</span>
<div class="w-touch-target"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow flex flex-col px-md py-xl max-w-2xl mx-auto w-full">
<!-- Progress Bar -->
<div class="w-full bg-divider h-1 rounded-full mb-xl overflow-hidden">
<div class="bg-primary h-full transition-all duration-700 ease-out" style="width: 66%"></div>
</div>
<!-- Headline Section -->
<section class="mb-xl text-center md:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-sm">
                What are your goals?
            </h1>
<p class="font-body-md text-text-secondary">
                Choose at least one to help your AI coach tailor your training.
            </p>
</section>
<!-- Goals Grid (Bento Style Variation) -->
<section class="grid grid-cols-1 sm:grid-cols-2 gap-md mb-xl" id="goals-container">
<!-- Hypertrophy -->
<button class="group flex items-center justify-between p-lg bg-surface border border-divider rounded-xl hover:border-primary-fixed-dim transition-all text-left shadow-sm" onclick="toggleGoal(this)">
<div class="flex flex-col gap-xs">
<span class="font-title-md text-primary group-active:text-white">Hypertrophy</span>
<span class="font-label-sm text-text-secondary group-active:text-white/80">Build muscle mass</span>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors check-circle">
<span class="material-symbols-outlined text-transparent select-none" data-icon="check" style="font-size: 20px;">check</span>
</div>
</button>
<!-- Strength -->
<button class="group flex items-center justify-between p-lg bg-surface border border-divider rounded-xl hover:border-primary-fixed-dim transition-all text-left shadow-sm" onclick="toggleGoal(this)">
<div class="flex flex-col gap-xs">
<span class="font-title-md text-primary group-active:text-white">Strength</span>
<span class="font-label-sm text-text-secondary group-active:text-white/80">Max power &amp; lifting</span>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors check-circle">
<span class="material-symbols-outlined text-transparent select-none" data-icon="check" style="font-size: 20px;">check</span>
</div>
</button>
<!-- Endurance -->
<button class="group flex items-center justify-between p-lg bg-surface border border-divider rounded-xl hover:border-primary-fixed-dim transition-all text-left shadow-sm" onclick="toggleGoal(this)">
<div class="flex flex-col gap-xs">
<span class="font-title-md text-primary group-active:text-white">Endurance</span>
<span class="font-label-sm text-text-secondary group-active:text-white/80">Stamina &amp; cardio health</span>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors check-circle">
<span class="material-symbols-outlined text-transparent select-none" data-icon="check" style="font-size: 20px;">check</span>
</div>
</button>
<!-- Fat Loss -->
<button class="group flex items-center justify-between p-lg bg-surface border border-divider rounded-xl hover:border-primary-fixed-dim transition-all text-left shadow-sm" onclick="toggleGoal(this)">
<div class="flex flex-col gap-xs">
<span class="font-title-md text-primary group-active:text-white">Fat Loss</span>
<span class="font-label-sm text-text-secondary group-active:text-white/80">Weight management</span>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors check-circle">
<span class="material-symbols-outlined text-transparent select-none" data-icon="check" style="font-size: 20px;">check</span>
</div>
</button>
<!-- Athletic Performance -->
<button class="group flex items-center justify-between p-lg bg-surface border border-divider rounded-xl hover:border-primary-fixed-dim transition-all text-left shadow-sm sm:col-span-2" onclick="toggleGoal(this)">
<div class="flex flex-col gap-xs">
<span class="font-title-md text-primary group-active:text-white">Athletic Performance</span>
<span class="font-label-sm text-text-secondary group-active:text-white/80">Agility, speed, and versatility</span>
</div>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors check-circle">
<span class="material-symbols-outlined text-transparent select-none" data-icon="check" style="font-size: 20px;">check</span>
</div>
</button>
</section>
<!-- Illustration / Mood Decor -->
<div class="mt-auto pt-lg flex justify-center opacity-40">
<div class="relative w-full max-w-sm h-32 overflow-hidden rounded-xl bg-surface-container flex items-center justify-center">
<div class="absolute inset-0 bg-cover bg-center grayscale mix-blend-overlay" data-alt="A minimalist clinical-chic fitness studio with soft morning light hitting arctic blue walls. Elegant exercise equipment is barely visible in the soft-focus background, creating a sense of serene focus and professional health-tech aesthetic. The lighting is high-key and pristine." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBAecKATbgweI0B_uPAMI_k0cwpc2wt7U5y565uhOl7QfgW8-M5zcH0q6yySoPaCWEAt0zPCLCuDNgsodniNv2TQr8tCxLDGLO-Krpd-AKpEyIilwUfnRwrJhhgbgS_vLefahO0g8QJFO1h8L7d3-wTwM_iGK2wpBxJt-sF9zUSI_X8bEJaABuYg1dlTMXEZ8jA6C6N_Ms_Lpl4eZJU5bOZJz2TWlQRv14Xkw8I9LT9VDwfE2pDBL1a-CEOm4k8KfrjajeueE4L2Aea')"></div>
<span class="material-symbols-outlined text-[64px] text-primary-fixed-dim animate-pulse" data-icon="insights">insights</span>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="sticky bottom-0 bg-background/95 backdrop-blur-md p-md pb-safe border-t border-divider">
<div class="max-w-2xl mx-auto w-full">
<button class="w-full h-touch-target-large bg-outline-variant text-on-primary font-title-md rounded-lg flex items-center justify-center gap-sm transition-all cursor-not-allowed" disabled="" id="continue-btn">
                Continue
                <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
<p class="text-center font-label-sm text-text-secondary mt-sm">
                Your data is stored securely and used to optimize your AI model.
            </p>
</div>
</footer>
<script>
        let selectedCount = 0;

        function toggleGoal(el) {
            const isSelected = el.classList.toggle('chip-active');
            const checkCircle = el.querySelector('.check-circle');
            const checkIcon = el.querySelector('.material-symbols-outlined[data-icon="check"]');
            
            if (isSelected) {
                selectedCount++;
                el.classList.remove('bg-surface', 'border-divider');
                el.classList.add('bg-joint-cyan', 'border-joint-cyan');
                checkCircle.classList.add('bg-white', 'border-white');
                checkIcon.classList.remove('text-transparent');
                checkIcon.classList.add('text-joint-cyan');
                // Change text colors
                el.querySelectorAll('span').forEach(s => {
                    if(!s.classList.contains('material-symbols-outlined')) {
                        s.classList.add('text-white');
                        s.classList.remove('text-primary', 'text-text-secondary');
                    }
                });
            } else {
                selectedCount--;
                el.classList.add('bg-surface', 'border-divider');
                el.classList.remove('bg-joint-cyan', 'border-joint-cyan');
                checkCircle.classList.remove('bg-white', 'border-white');
                checkIcon.classList.add('text-transparent');
                checkIcon.classList.remove('text-joint-cyan');
                // Revert text colors
                el.querySelector('.font-title-md').classList.remove('text-white');
                el.querySelector('.font-title-md').classList.add('text-primary');
                el.querySelector('.font-label-sm').classList.remove('text-white');
                el.querySelector('.font-label-sm').classList.add('text-text-secondary');
            }

            updateButtonState();
        }

        function updateButtonState() {
            const btn = document.getElementById('continue-btn');
            if (selectedCount > 0) {
                btn.disabled = false;
                btn.classList.remove('bg-outline-variant', 'cursor-not-allowed');
                btn.classList.add('bg-primary', 'shadow-lg', 'active:scale-95');
            } else {
                btn.disabled = true;
                btn.classList.add('bg-outline-variant', 'cursor-not-allowed');
                btn.classList.remove('bg-primary', 'shadow-lg', 'active:scale-95');
            }
        }
    </script>
</body></html>
