</label>

<label class="selection-card active group relative flex items-center justify-between p-lg rounded-xl bg-surface-container-lowest border-2 border-transparent shadow-[0_2px_8px_rgba(0,0,0,0.04)] cursor-pointer transition-all duration-200 active:scale-[0.98] hover:shadow-[0_4px_12px_rgba(0,0,0,0.06)]">
<input checked="" class="sr-only" name="frequency" type="radio" value="3"/>
<div class="flex flex-col">

<button class="w-full bg-primary text-on-primary font-title-md text-title-md py-[18px] rounded-lg active:scale-[0.98] transition-transform duration-200 shadow-[0_4px_14px_rgba(0,96,150,0.25)] flex items-center justify-center gap-2">
            Finish Setup
            <span class="material-symbols-outlined text-[20px]">check</span>
</button>

<!-- Interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.selection-card');
            
            cards.forEach(card => {
                const radio = card.querySelector('input[type="radio"]');
                
                // Add click listener to the label itself for better touch handling
                card.addEventListener('click', (e) => {
                    // Prevent double firing if clicking the radio input directly
                    if (e.target.tagName !== 'INPUT') {
                        radio.checked = true;
                    }
                    
                    // Update visual states
                    cards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                });
            });
        });
    </script>
